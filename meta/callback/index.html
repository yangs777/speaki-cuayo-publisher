<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meta OAuth Callback - Speaki Cuayo Publisher</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: #202124;
      background: #f7f3ee;
    }
    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    pre {
      overflow-x: auto;
      padding: 16px;
      border: 1px solid #d9d1c7;
      border-radius: 8px;
      background: #fffaf3;
      white-space: pre-wrap;
      word-break: break-all;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      color: #fff;
      background: #6d3df5;
      cursor: pointer;
      font-weight: 700;
    }
    .muted {
      color: #5f6368;
    }
    .error {
      color: #b3261e;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Meta OAuth Callback</h1>
    <p class="muted">
      This page is used by Speaki Cuayo Publisher to receive a Meta OAuth
      authorization code after a creator authorizes a connected account.
    </p>
    <section id="result"></section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");
    const errorDescription = params.get("error_description");
    const result = document.getElementById("result");

    if (error) {
      result.innerHTML = `
        <p class="error">Authorization failed.</p>
        <pre>${escapeHtml(errorDescription || error)}</pre>
      `;
    } else if (code) {
      result.innerHTML = `
        <p>Authorization code received. Copy this code into the local exchange script.</p>
        <pre id="code">${escapeHtml(code)}</pre>
        <button type="button" id="copy">Copy code</button>
        <p class="muted">State: ${escapeHtml(state || "(none)")}</p>
      `;
      document.getElementById("copy").addEventListener("click", async () => {
        await navigator.clipboard.writeText(code);
        document.getElementById("copy").textContent = "Copied";
      });
    } else {
      result.innerHTML = `
        <p>No authorization code is present yet.</p>
        <p class="muted">Start the Meta login flow from the local tool first.</p>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
