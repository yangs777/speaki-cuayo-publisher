<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TikTok Authorization Callback</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: #202124;
      background: #f7f3ee;
    }
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    code {
      display: block;
      overflow-wrap: anywhere;
      padding: 14px;
      border: 1px solid #ded7ce;
      border-radius: 8px;
      background: #fffaf3;
    }
  </style>
</head>
<body>
  <main>
    <h1>TikTok Authorization Callback</h1>
    <p>
      This page receives an authorization code after a creator connects a
      TikTok account to Speaki Cuayo Publisher.
    </p>
    <p>
      <a href="../../privacy.html">Privacy Policy</a> |
      <a href="../../terms.html">Terms of Service</a>
    </p>
    <code id="code">No authorization code found in the URL.</code>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    const output = code
      ? `code=${code}${state ? `\nstate=${state}` : ""}`
      : "No authorization code found in the URL.";
    document.getElementById("code").textContent = output;
  </script>
</body>
</html>
